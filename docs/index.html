<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎓 System Design Vui Vẻ - Từ Zero đến Hero</title>
  <link rel="stylesheet" href="assets/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap"
    rel="stylesheet">
</head>

<body>

  <!-- TOP NAV -->
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <span class="logo">🎓</span>
        <div>
          <div class="brand-title">System Design</div>
        </div>
      </div>
      <div class="top-actions">
        <input type="text" id="searchBox" placeholder="🔍 Tìm kiếm chương..." />
        <button id="themeToggle" title="Đổi giao diện">🌙</button>
      </div>
    </div>
  </header>

  <div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="progress-wrap">
        <div class="progress-label">Tiến độ học 📚</div>
        <div class="progress-bar">
          <div id="progressFill"></div>

      </div>
      <nav id="navList"></nav>

    <!-- MAIN -->
    <main class="content">
      <article id="chapterContainer">
        <div class="loading">Đang tải nội dung... ⏳</div>
      </article>

      <!-- PAGINATION -->
      <div class="pagination">
        <button id="prevBtn">⬅️ Chương trước</button>
        <div id="pageInfo" class="page-info">Chương 1 / 30</div>
        <button id="nextBtn">Chương kế ➡️</button>
      </div>

      <footer class="footer">
        <p>💡 Học System Design giống như xây Lego: bắt đầu từ những khối nhỏ, kiên trì rồi sẽ ra Death Star! 🚀</p>
        <p>Made with ❤️ + ☕ + 🎵 | © 2026 System Design Vui Vẻ</p>
      </footer>
    </main>
  </div>

  <button id="mobileMenu" class="mobile-menu">☰</button>

  <!-- Load chương 1-23 (kiến thức nền) -->
  <script src="assets/chapters.js"></script> <!-- Chương 1-7  -->
  <script src="assets/chapters-extra.js"></script> <!-- Chương 8-15 -->
  <script src="assets/chapters-extra2.js"></script> <!-- Chương 16-23 -->

  <!-- Load case studies deep dive (chương 24-30) - mỗi case 1 file -->

  <script src="assets/case-twitter.js"></script> <!-- Chương 25 -->
  <script src="assets/case-facebook.js"></script> <!-- Chương 26 -->
  <script src="assets/case-netflix.js"></script> <!-- Chương 27 -->
  <script src="assets/case-uber.js"></script> <!-- Chương 28 -->
  <script src="assets/case-whatsapp.js"></script> <!-- Chương 29 -->
  <script src="assets/case-instayoutube.js"></script> <!-- Chương 30 -->

  <script src="assets/app.js"></script>
